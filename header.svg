<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep space background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#04060c"/>
      <stop offset="40%" style="stop-color:#0d0400"/>
      <stop offset="70%" style="stop-color:#1a0700"/>
      <stop offset="100%" style="stop-color:#04060c"/>
    </linearGradient>

    <!-- Orange glow radial -->
    <radialGradient id="glow1" cx="65%" cy="30%" r="45%">
      <stop offset="0%" style="stop-color:#ea580c;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="75%" r="35%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0"/>
    </radialGradient>

    <!-- Name gradient -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="45%" style="stop-color:#fde68a"/>
      <stop offset="75%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>

    <!-- Clip path for scan line -->
    <clipPath id="scanClip">
      <rect x="0" y="0" width="900" height="300"/>
    </clipPath>

    <!-- Grid pattern -->
    <pattern id="grid" x="0" y="0" width="45" height="45" patternUnits="userSpaceOnUse">
      <path d="M 45 0 L 0 0 0 45" fill="none" stroke="rgba(249,115,22,0.045)" stroke-width="0.5"/>
    </pattern>

    <!-- Particle filter -->
    <filter id="blur1">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- BG -->
  <rect width="900" height="300" fill="url(#bg)"/>
  <rect width="900" height="300" fill="url(#grid)"/>
  <rect width="900" height="300" fill="url(#glow1)"/>
  <rect width="900" height="300" fill="url(#glow2)"/>

  <!-- Animated particles -->
  <g opacity="0.7">
    <circle cx="80" cy="60" r="1.2" fill="#fb923c" filter="url(#blur1)">
      <animate attributeName="cy" values="60;50;60" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="240" r="0.9" fill="#fbbf24" filter="url(#blur1)">
      <animate attributeName="cy" values="240;228;240" dur="5.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="80" r="1.4" fill="#fb923c" filter="url(#blur1)">
      <animate attributeName="cy" values="80;68;80" dur="3.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="820" cy="200" r="1" fill="#f97316" filter="url(#blur1)">
      <animate attributeName="cy" values="200;190;200" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.15;0.6" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="30" r="0.8" fill="#fde68a" filter="url(#blur1)">
      <animate attributeName="cy" values="30;22;30" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="130" cy="170" r="1.1" fill="#fb923c" filter="url(#blur1)">
      <animate attributeName="cx" values="130;140;130" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="680" cy="250" r="0.9" fill="#fbbf24" filter="url(#blur1)">
      <animate attributeName="cy" values="250;240;250" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.15;0.6" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="340" cy="260" r="1.2" fill="#f97316" filter="url(#blur1)">
      <animate attributeName="cy" values="260;250;260" dur="4.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="4.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="45" r="1" fill="#fb923c" filter="url(#blur1)">
      <animate attributeName="cy" values="45;35;45" dur="6.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="6.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Corner brackets -->
  <g stroke="#ea580c" stroke-width="2" fill="none" opacity="0.6">
    <!-- TL -->
    <path d="M 20 36 L 20 20 L 36 20"/>
    <!-- TR -->
    <path d="M 864 20 L 880 20 L 880 36"/>
    <!-- BL -->
    <path d="M 20 264 L 20 280 L 36 280"/>
    <!-- BR -->
    <path d="M 864 280 L 880 280 L 880 264"/>
  </g>

  <!-- Side labels -->
  <text x="10" y="155" font-family="monospace" font-size="8" fill="rgba(249,115,22,0.3)" letter-spacing="2" transform="rotate(-90,10,155)">WEBNECO_INFOTECH_v6</text>
  <text x="893" y="155" font-family="monospace" font-size="8" fill="rgba(249,115,22,0.3)" letter-spacing="2" transform="rotate(90,893,155)">AI_BUILDER · MERN</text>

  <!-- Eyebrow line -->
  <g opacity="0" filter="url(#glow-filter)">
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.2s" fill="freeze"/>
    <line x1="350" y1="98" x2="390" y2="98" stroke="#ea580c" stroke-width="1" opacity="0.6"/>
    <text x="450" y="102" font-family="'Courier New',monospace" font-size="11" fill="#ea580c" text-anchor="middle" letter-spacing="4" opacity="0.9">FULL STACK · AI BUILDER · FOUNDER</text>
    <line x1="510" y1="98" x2="550" y2="98" stroke="#ea580c" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Main name with gradient fill — fades + slides in -->
  <text
    x="450" y="170"
    font-family="'Arial Black','Impact',sans-serif"
    font-size="62"
    font-weight="900"
    text-anchor="middle"
    letter-spacing="-1"
    fill="url(#nameGrad)"
    filter="url(#glow-filter)"
    opacity="0"
  >
    ADITYA VIKRAM SINGH
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.1s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="0,14;0,0" dur="0.8s" begin="0.1s" fill="freeze"/>
  </text>

  <!-- Subtitle -->
  <text
    x="450" y="205"
    font-family="'Courier New',monospace"
    font-size="13.5"
    text-anchor="middle"
    fill="#94a3b8"
    letter-spacing="0.5"
    opacity="0"
  >
    ⚡ MERN Dev  ·  🤖 AI Builder  ·  🏢 Founder @ WebNeco  ·  🚀 Building Nirmaanly
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.4s" fill="freeze"/>
  </text>

  <!-- Orange accent underline under name -->
  <rect x="0" y="0" width="0" height="2" y="218" fill="url(#nameGrad)" rx="1" opacity="0.5">
    <animate attributeName="width" values="0;900" dur="1s" begin="0.6s" fill="freeze"/>
    <animate attributeName="x" values="450;0" dur="1s" begin="0.6s" fill="freeze"/>
  </rect>

  <!-- Tag line -->
  <text
    x="450" y="256"
    font-family="'Courier New',monospace"
    font-size="12"
    text-anchor="middle"
    fill="#f97316"
    letter-spacing="2"
    font-weight="bold"
    opacity="0"
  >
    Building for Bharat 🇮🇳 → Global
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="0.7s" fill="freeze"/>
  </text>

  <!-- Scan line animation -->
  <g clip-path="url(#scanClip)">
    <rect x="0" y="-2" width="900" height="2" fill="url(#nameGrad)" opacity="0.4">
      <animateTransform attributeName="transform" type="translate" values="0,-2;0,302" dur="3.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Bottom border glow -->
  <rect x="0" y="297" width="900" height="3" fill="url(#nameGrad)" opacity="0.35"/>
</svg>
